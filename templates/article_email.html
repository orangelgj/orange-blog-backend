<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #FFB74D 0%, #FFA726 50%, #FF8C00 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(60px) saturate(180%);
            -webkit-backdrop-filter: blur(60px) saturate(180%);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 
                0 25px 50px -12px rgba(255, 140, 0, 0.4),
                0 12px 24px -8px rgba(255, 140, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.9) 15%, 
                rgba(255, 255, 255, 1) 50%, 
                rgba(255, 255, 255, 0.9) 85%, 
                transparent 100%);
            transition: all 0.4s ease;
        }
        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(135deg, 
                    rgba(255, 255, 255, 0.4) 0%, 
                    transparent 45%, 
                    rgba(255, 255, 255, 0.15) 100%),
                linear-gradient(180deg, 
                    rgba(255, 255, 255, 0.2) 0%, 
                    transparent 30%);
            pointer-events: none;
            border-radius: 32px;
            transition: all 0.4s ease;
        }
        .container-gloss {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 0.15) 0%, 
                transparent 60%);
            pointer-events: none;
            animation: glossMove 8s ease-in-out infinite;
        }
        @keyframes glossMove {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            50% {
                transform: translate(10%, -10%) rotate(5deg);
            }
        }
        .header {
            background: linear-gradient(135deg, #FFA726 0%, #FF8C00 100%);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .header-emoji {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
            position: relative;
            z-index: 1;
        }
        .content {
            padding: 40px 30px;
            position: relative;
            z-index: 1;
        }
        .article-title {
            font-size: 22px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid rgba(255, 167, 38, 0.3);
            position: relative;
        }
        .article-title::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #FFA726, #FF8C00);
            border-radius: 2px;
        }
        .info {
            background: rgba(255, 167, 38, 0.08);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            padding: 24px;
            border-radius: 20px;
            margin: 25px 0;
            font-size: 15px;
            color: #555;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 8px 32px rgba(255, 140, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            position: relative;
            transition: all 0.3s ease;
        }
        .info:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 12px 40px rgba(255, 140, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            background: rgba(255, 167, 38, 0.1);
        }
        .info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.6) 50%, 
                transparent 100%);
        }
        .info p {
            margin: 8px 0;
        }
        .article-link {
            display: inline-block;
            background: linear-gradient(135deg, #FFA726 0%, #FF8C00 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 32px;
            font-weight: 600;
            font-size: 16px;
            margin: 25px 0;
            transition: all 0.3s ease;
            box-shadow: 
                0 12px 40px rgba(255, 140, 0, 0.5),
                0 4px 12px rgba(255, 140, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        .article-link:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 16px 48px rgba(255, 140, 0, 0.6),
                0 6px 16px rgba(255, 140, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        .article-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
        }
        .article-link:hover::before {
            left: 100%;
        }
        .article-link::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.6) 50%, 
                transparent 100%);
        }
        .button-group {
            display: flex;
            gap: 20px;
            margin: 25px 0;
            align-items: center;
        }
        .button-group > div {
            flex: 1;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 167, 38, 0.3), transparent);
            margin: 30px 0;
        }
        .footer {
            background: rgba(255, 167, 38, 0.06);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            padding: 30px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .footer p {
            margin: 10px 0;
            font-size: 13px;
            color: #666;
        }
        .unsubscribe {
            color: #FF8C00;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        .unsubscribe:hover {
            color: #FFA726;
        }
        .cute-decoration {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 24px;
        }
        .link-box {
            background: rgba(255, 167, 38, 0.06);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 13px;
            color: #666;
            box-shadow: 
                0 8px 32px rgba(255, 140, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            position: relative;
            transition: all 0.3s ease;
        }
        .link-box:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 12px 40px rgba(255, 140, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            background: rgba(255, 167, 38, 0.08);
        }
        .link-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.5) 50%, 
                transparent 100%);
        }
        .link-box a {
            color: #FF8C00;
            word-break: break-all;
            text-decoration: none;
            font-weight: 500;
        }
        .link-box a:hover {
            text-decoration: underline;
        }
        .copy-btn {
            display: inline-block;
            background: linear-gradient(135deg, #FFA726 0%, #FF8C00 100%);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 32px;
            font-weight: 600;
            font-size: 16px;
            margin: 0;
            transition: all 0.3s ease;
            box-shadow: 
                0 12px 40px rgba(255, 140, 0, 0.6),
                0 4px 12px rgba(255, 140, 0, 0.4),
                0 0 0 2px rgba(255, 255, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .copy-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 16px 48px rgba(255, 140, 0, 0.7),
                0 6px 16px rgba(255, 140, 0, 0.5),
                0 0 0 2px rgba(255, 255, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .copy-btn:active {
            transform: translateY(0) scale(0.98);
        }
        .copy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
        }
        .copy-btn:hover::before {
            left: 100%;
        }
        .copy-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.6) 50%, 
                transparent 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="container-gloss"></div>
        <div class="header">
            <span class="header-emoji">🍊</span>
            <h1>橘子博客</h1>
        </div>
        <div class="content">
            <div class="cute-decoration">
                <span>✨</span>
                <span>🍊</span>
                <span>🎉</span>
            </div>
            <h2 class="article-title">文章标题：{{.Title}}</h2>
            <div class="info">
                <p>👋 亲爱的 <strong>{{.Username}}</strong>，</p>
                <p>橘子刚刚发布了一篇新文章，快来看看吧！</p>
            </div>
            <div class="button-group">
                <div style="text-align: center; flex: 1;">
                    <a href="{{.URL}}" class="article-link">🍊 阅读文章 </a>
                </div>
                <div style="text-align: center; flex: 1;">
                    <button id="copy-btn" class="copy-btn"> 复制链接 🍊</button>
                </div>
            </div>
            <div class="divider"></div>
            <div class="link-box">
                💡 <strong>推荐：</strong>在QQ等应用内打开邮件时，复制链接到登录过的浏览器打开更方便！<br>
                如果按钮点不动，试试复制这个链接：<br>
                <a href="{{.URL}}">{{.URL}}</a>
            </div>
        </div>
        <div class="footer">
            <div class="cute-decoration" style="font-size: 18px; margin: 15px 0;">
                <span>🍊</span>
                <span>💛</span>
                <span>🍊</span>
            </div>
            <p>这封邮件是橘子博客自动发送（2026.3.21 刚更新的功能 TT）~</p>
            <p>不想收到邮件？<a href="mailto:your_email@example.com?subject=取消订阅" class="unsubscribe">点这里取消订阅，或直接联系我</a></p>
            <p style="margin-top: 20px;">© 2026 橘子博客. All rights reserved.</p>
        </div>
    </div>
    <script>
        (function() {
            const url = '{{.URL}}';
            const copyBtn = document.getElementById('copy-btn');
            
            copyBtn.addEventListener('click', function() {
                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(url).then(function() {
                            showSuccess();
                        }).catch(function(err) {
                            fallbackCopy();
                        });
                    } else {
                        fallbackCopy();
                    }
                } catch (err) {
                    fallbackCopy();
                }
            });
            
            function showSuccess() {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ 已复制！';
                copyBtn.style.background = 'rgba(92, 184, 92, 0.85)';
                copyBtn.style.color = '#ffffff';
                setTimeout(function() {
                    copyBtn.textContent = originalText;
                    copyBtn.style.background = 'rgba(255, 255, 255, 0.75)';
                    copyBtn.style.color = '#FF8C00';
                }, 2000);
            }
            
            function fallbackCopy() {
                const textArea = document.createElement('textarea');
                textArea.value = url;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (err) {
                    alert('复制失败，请手动复制链接');
                    console.error('复制失败:', err);
                }
                document.body.removeChild(textArea);
            }
        })();
    </script>
</body>
</html>
